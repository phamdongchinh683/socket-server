services:
  - type: web
    name: socket-server
    runtime: node
    plan: free
    buildCommand: yarn install --frozen-lockfile
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: API_URL
        sync: false
      # CHỈ chọn 1 trong 2:
      # - Upstash REST (single instance):
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # - Hoặc TCP (hỗ trợ scale nhiều instance qua adapter):
      - key: REDIS_URL
        sync: false
