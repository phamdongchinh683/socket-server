services:
  - type: web
    name: socket-server
    runtime: node
    plan: free
    buildCommand: yarn install --frozen-lockfile
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: API_URL
        sync: false
      # Redis: use Upstash REST (recommended) or traditional REDIS_URL
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      # Optional: REDIS_URL (rediss://) also enables Socket.IO scaling adapter
