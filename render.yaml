services:
  - type: web
    name: socket-server
    runtime: node
    plan: free
    buildCommand: yarn install --frozen-lockfile
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: API_URL
        sync: false
      # Redis riêng cho Socket.IO adapter (Pub/Sub). Dùng khi muốn giữ Upstash cho online presence.
      # - key: SOCKET_REDIS_URL
      #   sync: false
