services:
  - type: web
    name: socket-server
    runtime: node
    plan: free
    buildCommand: yarn install --frozen-lockfile
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: API_URL
        sync: false
      - key: INTERNAL_SOCKET_TOKEN
        sync: false
